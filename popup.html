<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 10px; font-family: Arial, sans-serif; background: #f9f9f9; }
    textarea { width: 100%; height: 80px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; padding: 5px; box-sizing: border-box;}
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #ddd;}
    .week-input { width: 50px; padding: 3px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
    button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px;}
    
    #startBtn { background: #FF9900; } #startBtn:hover { background: #e38800; }
    #multiWeekBtn { background: #8B5CF6; } #multiWeekBtn:hover { background: #7C3AED; }
    #batchDownloadBtn { background: #3B82F6; } #batchDownloadBtn:hover { background: #2563EB; }
    #resetBtn { background: #6B7280; } #resetBtn:hover { background: #4B5563; }
  </style>
</head>
<body>
  <h3 style="margin-top: 0; font-size: 15px;">亚马逊 ABA 报告全自动下载</h3>
  <textarea id="asinList" placeholder="在此粘贴ASIN列表 (用于常规批量处理)"></textarea>
  
  <div class="row">
    <span style="font-size: 12px; color: #333; font-weight: bold;">单ASIN连续下载 ➔</span>
    <span style="font-size: 12px;">连下 <input type="number" id="weekCount" class="week-input" value="10" min="1" max="50"> 周</span>
  </div>

  <button id="startBtn">▶ 1. 多 ASIN 下载 (常规模式)</button>
  <button id="multiWeekBtn">🕰️ 2. 单 ASIN 连续往下 N 周</button>
  <button id="batchDownloadBtn">⬇️ 3. 一键批量下载 (下载管理器使用)</button>
  <button id="resetBtn">🔄 4. 重置下载序号</button>
  
  <p id="status" style="color: #10B981; font-size: 12px; margin-bottom: 0; font-weight: bold;"></p>
  <script src="popup.js"></script>
</body>
</html>
